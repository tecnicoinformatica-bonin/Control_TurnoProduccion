<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Cambio de contraseña - Turnos Bonin</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/bootstrap.min.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='img/favicon.png') }}"
    />
  </head>

  <body>
    <sectionopenpyxl
      class="change-password-bg p-3 p-md-4 p-xl-5 min-vh-100 d-flex align-items-center"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-9 col-lg-7 col-xl-6 col-xxl-5">
            <div class="card login-card fade-in-card">
              <div class="card-body p-3 p-md-4 p-xl-5">
                <div class="row">
                  <div class="col-12">
                    <div class="mb-5">
                      <h2 class="h3">Cambio de contraseña</h2>
                      <h3 class="fs-6 fw-normal text-secondary m-0">
                        Por favor, ingrese su nueva contraseña
                      </h3>
                    </div>
                  </div>
                </div>

                <!-- Formulario -->
                <form action="/web/usuario/cambiarPasswordUsuario_web" method="POST">
                  <div class="row gy-3 overflow-hidden">
                    <div hidden class="col-12">
                      <div class="form-floating mb-3">
                        <input
                          type="text"
                          class="form-control"
                          name="idUsuario"
                          id="idUsuario"
                          placeholder="Usuario"
                          required
                          value = "{{ idUsuarioData }}"
                        />
                        <label for="idUsuario" class="form-label">ID del usuario</label>
                      </div>
                    </div>
                    <div class="col-12">
                      <div class="form-floating mb-3">
                        <input
                          type="password"
                          class="form-control"
                          name="password"
                          id="password"
                          placeholder="Contraseña"
                          required
                        />
                        <label for="password" class="form-label"
                          >Contraseña</label
                        >
                      </div>
                    </div>
                    <div class="col-12">
                      <div class="form-floating mb-3">
                        <input
                          type="password"
                          class="form-control"
                          name="confirmedPassword"
                          id="confirmedPassword"
                          placeholder="Confirmar contraseña"
                          required
                        />
                        <label for="confirmedPassword" class="form-label"
                          >Confirmar contraseña</label
                        >
                      </div>
                    </div>
                    {% with messages =
                    get_flashed_messages(with_categories=true) %} {% for
                    category, message in messages %}
                    <div
                      class="alert alert-{{ category }} alert-dismissible"
                      role="alert"
                    >
                      <strong>{{ message }}</strong>
                      <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="alert"
                        aria-label="Close"
                      ></button>
                    </div>
                    {% endfor %} {% endwith %}
                    
                    <div class="col-12">
                      <div class="d-grid">
                        <button
                          class="btn bsb-btn-2xl btn-danger"
                          type="submit"
                        >
                          Cambiar contraseña
                        </button>
                      </div>
                    </div>
                  </div>
                </form>
               
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
  </body>
</html>
