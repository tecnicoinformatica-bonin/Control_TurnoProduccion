<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Inicio de sesión - Turnos Bonin</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/bootstrap.min.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='img/favicon.png') }}"
    />
  </head>

  <body>
    <sectionopenpyxl
      class="login-bg p-3 p-md-4 p-xl-5 min-vh-100 d-flex align-items-center"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-9 col-lg-7 col-xl-6 col-xxl-5">
            <div class="card login-card fade-in-card">
              <div class="card-body p-3 p-md-4 p-xl-5">
                <div class="row">
                  <div class="col-12">
                    <div class="mb-5">
                      <h2 class="h3">Inicio de sesión</h2>
                      <h3 class="fs-6 fw-normal text-secondary m-0">
                        Ingresa tus datos para iniciar sesión
                      </h3>
                    </div>
                  </div>
                </div>

                <!-- Formulario -->
                <form action="/web/usuario/login" method="POST">
                  <div class="row gy-3 overflow-hidden">
                    <div class="col-12">
                      <div class="form-floating mb-3">
                        <input
                          type="text"
                          class="form-control"
                          name="username"
                          id="username"
                          placeholder="Usuario"
                          required
                        />
                        <label for="username" class="form-label">Usuario</label>
                      </div>
                    </div>
                    <div class="col-12">
                      <div class="form-floating mb-3">
                        <input
                          type="password"
                          class="form-control"
                          name="password"
                          id="password"
                          placeholder="Contraseña"
                          required
                        />
                        <label for="password" class="form-label"
                          >Contraseña</label
                        >
                      </div>
                    </div>
                    {% with messages =
                    get_flashed_messages(with_categories=true) %} {% for
                    category, message in messages %}
                    <div
                      class="alert alert-{{ category }} alert-dismissible"
                      role="alert"
                    >
                      <strong>{{ message }}</strong>
                      <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="alert"
                        aria-label="Close"
                      ></button>
                    </div>
                    {% endfor %} {% endwith %}
                    <!-- <div class="form-floating">
                      <select
                        class="form-select"
                        id="floatingSelect"
                        name="departamento"
                        required
                      >
                        <option selected>
                          Seleccione el departamento al cual desea ingresar
                        </option>

                        {% for d in departamentos %}
                        <option value="{{d.id}}">{{ d.name }}</option>
                        {% endfor %}
                      </select>
                      <label for="floatingSelect"
                        >Selección de departamento</label
                      >
                    </div> -->

                    <div class="col-12">
                      <div class="d-grid">
                        <button
                          class="btn bsb-btn-2xl btn-primary"
                          type="submit"
                        >
                          Iniciar
                        </button>
                      </div>
                    </div>
                  </div>
                </form>
                <!-- <div class="row">
              <div class="col-12">
                <hr class="mt-5 mb-4 border-secondary-subtle" />
                <p class="m-0 text-secondary text-center">
                  ¿Olvidaste tu contraseña?
                  <a href="#!" class="link-primary text-decoration-none"
                    >Click aquí</a
                  >
                </p>
              </div>
            </div> -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
  </body>
</html>
