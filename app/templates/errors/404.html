{% extends "layout/base.html" %} {% block title %} 404 - No encontrado {%
endblock %} {% block content %}

<div
  class="container min-vh-100 d-flex align-items-center justify-content-center"
>
  <div class="text-center">
    <div class="mb-4">
      <i class="bi bi-emoji-frown text-primary" style="font-size: 6rem"></i>
    </div>

    <h1 class="display-1 fw-bold text-dark">404</h1>

    <h2 class="fw-semibold mb-3">No encontrado</h2>

    <p class="text-muted fs-5 mb-4">
      No se encontró la ruta, comunícate con el departamento de Informática.
    </p>

    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a
        href="{{ url_for('home_template.index') }}"
        class="btn btn-primary btn-lg px-4 shadow-sm"
      >
        <i class="bi bi-house-door-fill me-2"></i>
        Volver al inicio
      </a>

      <button
        onclick="history.back()"
        class="btn btn-outline-secondary btn-lg px-4"
      >
        <i class="bi bi-arrow-left me-2"></i>
        Regresar
      </button>
    </div>
  </div>
</div>

{% endblock %}
