{% extends "layout/base.html" %} {% block title %} Crear ruta - Turnos Bonin {%
endblock %} {% block content %}

<div class="">
  <!-- <div class="btn-group d-flex crud-control">
    <a href="#" class="btn btn-dark active">Crear</a>
    <a href="#" class="btn btn-dark">Editar</a>
    <a href="#" class="btn btn-dark">Eliminar</a>
  </div> -->
  <hr class="mb-5" />

  <!-- form card cc payment -->
  <div class="card card-outline-secondary bg-dark text-light">
    <div class="card-body">
      <h3 class="text-left">Crear ruta</h3>
      <hr />

      {% with messages = get_flashed_messages(with_categories=true) %} {% for
      category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible" role="alert">
        <strong>{{ message }}</strong>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>
      {% endfor %} {% endwith %}

      <form
        class="form"
        role="form"
        action="/web/ruta/crearRuta_web"
        method="POST"
      >
        <div class="form-group">
          <label for="path">Path de la ruta</label>
          <input
            type="text"
            class="form-control"
            id="path"
            name="path"
            title="Path de la ruta"
            required
          />
        </div>

        <hr />
        <div class="form-group row">
          <div class="col-md-6">
            <button type="reset" class="btn btn-light btn-lg btn-block">
              Borrar información
            </button>
          </div>
          <div class="col-md-6">
            <button type="submit" class="btn btn-success btn-lg btn-block">
              Crear
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
